<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="page-header">
    <h1>Job Application Tracker</h1>
    <p class="page-description">
      Keep track of your job applications in one place. Record company details,
      positions, and application status as you search for your next opportunity.
    </p>
  </header>

  <main class="page-main">
    <section class="form-section" aria-labelledby="form-section-heading">
      <h2 id="form-section-heading">Add Application</h2>

      <form class="application-form">
        <div class="form-group">
          <label for="company">Company</label>
          <input type="text" id="company" name="company" required>
        </div>

        <div class="form-group">
          <label for="job-title">Job Title</label>
          <input type="text" id="job-title" name="job-title" required>
        </div>

        <div class="form-group">
          <label for="date-applied">Date Applied</label>
          <input type="date" id="date-applied" name="date-applied" required>
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>

        <button type="submit" class="btn-submit">Add Application</button>
      </form>
    </section>

    <section class="list-section" aria-labelledby="list-section-heading">
      <h2 id="list-section-heading">Your Applications</h2>

      <p class="empty-state" id="empty-state">No applications yet. Add your first application above.</p>

      <ul class="application-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
